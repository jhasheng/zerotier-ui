image: node:20-alpine

stages:
  - deploy

pages:
  stage: deploy
  tags:
    - tdesign-builder
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/
  script:
    - npm ci --cache .npm --prefer-offline --no-audit --fund=false
    - npm run build
    # Vite outputs to dist/. GitLab Pages publishes the `public/` artifact.
    # The repo also keeps a `public/` for Vite static assets — Vite already
    # copies its contents into dist/, so it's safe to overwrite.
    - rm -rf public
    - mv dist public
    # SPA fallback: GitLab Pages serves 404.html for unknown routes.
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    # Run on every branch push so the first deploy works without first creating
    # a default branch / opening an MR. Tighten to `$CI_DEFAULT_BRANCH` once
    # you've merged to master.
    - if: $CI_COMMIT_BRANCH
